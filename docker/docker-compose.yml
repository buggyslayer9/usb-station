version: "3.8"

services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: usb-station-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - DATABASE_URL=sqlite:///data/usb-station.db?mode=rwc
      - STORAGE_ISO_PATH=/storage/iso
      - STORAGE_DOWNLOAD_PATH=/storage/downloads
      - STORAGE_LOG_PATH=/logs
      - FLASH_MAX_CONCURRENT=2
      - FLASH_VERIFY=true
      - LOG_LEVEL=info
    volumes:
      - usb-station-data:/data
      - usb-station-iso:/storage/iso
      - usb-station-downloads:/storage/downloads
      - usb-station-logs:/logs
      - /dev:/dev:ro
      - /run/udev:/run/udev:ro
    devices:
      - /dev/sda
      - /dev/sdb
      - /dev/sdc
      - /dev/sdd
      - /dev/nvme0n1
    privileged: false
    cap_add:
      - SYS_ADMIN
      - SYS_RAWIO
      - MKNOD
    group_add:
      - disk
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: usb-station-frontend
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  usb-station-data:
  usb-station-iso:
  usb-station-downloads:
  usb-station-logs:
